name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v2.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build wheel "setuptools>=68"

      - name: Build packages
        run: |
          mkdir -p release-artifacts
          python -m build --no-isolation --sdist --wheel --outdir release-artifacts/api .
          python -m build --no-isolation --sdist --wheel --outdir release-artifacts/sdk sdk
          python -m build --no-isolation --sdist --wheel --outdir release-artifacts/mcp mcp-server
          tar -czf release-artifacts/agentsearch-source-${GITHUB_SHA::7}.tar.gz \
            --exclude=.git \
            --exclude='*.egg-info' \
            --exclude='*/dist' \
            --exclude='*/build' \
            .

      - name: Write release notes
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          {
            echo "AgentSearch ${TAG}"
            echo
            echo "Artifacts:"
            echo "- API source distribution and wheel"
            echo "- SDK source distribution and wheel"
            echo "- MCP source distribution and wheel"
            echo "- Repository source tarball"
            echo
            echo "Run the Test and CodeQL workflows before publishing this release as final."
          } > /tmp/agentsearch-release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            TARGET_ARGS=(--verify-tag)
          else
            TARGET_ARGS=(--target "$GITHUB_SHA")
          fi

          gh release create "$TAG" \
            release-artifacts/api/* \
            release-artifacts/sdk/* \
            release-artifacts/mcp/* \
            release-artifacts/agentsearch-source-${GITHUB_SHA::7}.tar.gz \
            --title "AgentSearch ${TAG}" \
            --notes-file /tmp/agentsearch-release-notes.md \
            "${TARGET_ARGS[@]}"
