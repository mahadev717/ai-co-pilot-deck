[project]
name = "agent-search-mcp"
version = "1.0.0"
description = "MCP tool server for AgentSearch — self-hosted multi-engine search API"
requires-python = ">=3.10"
dependencies = ["mcp>=1.27.2,<1.28.0", "httpx>=0.27.0,<0.29.0"]
readme = "README.md"
license = { text = "AGPL-3.0" }

[project.urls]
Homepage = "https://github.com/brcrusoe72/agent-search"
Repository = "https://github.com/brcrusoe72/agent-search"

[project.scripts]
agent-search-mcp = "agent_search_mcp.server:cli"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"
